<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="description" content="Simple time tracking app for tablets with kiosk and admin mode" />
    
    <title>Simple Time Tracking</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./icons/icon-base.svg" />
    <link rel="icon" type="image/png" href="./icons/icon-192x192.png" />
    
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="install-prompt" class="install-prompt hidden">
      <div class="install-content">
        <h3>Install Time Tracker</h3>
        <p>Install this app on your device for better experience and offline access.</p>
        <div class="install-actions">
          <button id="install-btn" class="btn btn-success">Install App</button>
          <button id="install-dismiss" class="btn">Maybe Later</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="./src/app.js"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }

      // PWA install prompt
      let deferredPrompt;
      const installPrompt = document.getElementById('install-prompt');
      const installBtn = document.getElementById('install-btn');
      const dismissBtn = document.getElementById('install-dismiss');

      const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
      const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installPrompt.classList.remove('hidden');
      });

      installBtn.addEventListener('click', () => {
        installPrompt.classList.add('hidden');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            console.log('User choice:', choiceResult.outcome);
            deferredPrompt = null;
          });
        }
      });

      dismissBtn.addEventListener('click', () => {
        installPrompt.classList.add('hidden');
        localStorage.setItem('install-dismissed', Date.now());
      });

      // Hide install prompt if dismissed recently
      if (localStorage.getItem('install-dismissed')) {
        const dismissedTime = parseInt(localStorage.getItem('install-dismissed'));
        if (Date.now() - dismissedTime < 7 * 24 * 60 * 60 * 1000) { // 7 days
          installPrompt.classList.add('hidden');
        }
      }

      // iOS/Safari fallback (no beforeinstallprompt support)
      if (isIOS && !isInStandalone && !localStorage.getItem('install-dismissed')) {
        installPrompt.classList.remove('hidden');
        installBtn.style.display = 'none';
        const text = installPrompt.querySelector('p');
        text.textContent = 'On iPad/iPhone: Share -> Add to Home Screen to install.';
      }
    </script>
  </body>
</html>
